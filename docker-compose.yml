version: "3.9"

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: hakaton_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hakaton
      POSTGRES_PASSWORD: hakaton_secret
      POSTGRES_DB: hakaton_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hakaton -d hakaton_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hakaton_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@hakaton.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
